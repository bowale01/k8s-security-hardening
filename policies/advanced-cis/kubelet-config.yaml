# CIS 4.2.x - Kubelet Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubelet-config
  namespace: kube-system
data:
  kubelet: |
    apiVersion: kubelet.config.k8s.io/v1beta1
    kind: KubeletConfiguration
    # CIS 4.2.1: Ensure that the --anonymous-auth argument is set to false
    authentication:
      anonymous:
        enabled: false
      webhook:
        enabled: true
        cacheTTL: 2m0s
      x509:
        clientCAFile: /etc/kubernetes/pki/ca.crt
    # CIS 4.2.2: Ensure that the --authorization-mode argument is not set to AlwaysAllow
    authorization:
      mode: Webhook
      webhook:
        cacheAuthorizedTTL: 5m0s
        cacheUnauthorizedTTL: 30s
    # CIS 4.2.3: Ensure that the --client-ca-file argument is set as appropriate
    clientCAFile: /etc/kubernetes/pki/ca.crt
    # CIS 4.2.4: Ensure that the --read-only-port argument is set to 0
    readOnlyPort: 0
    # CIS 4.2.5: Ensure that the --streaming-connection-idle-timeout argument is not set to 0
    streamingConnectionIdleTimeout: 5m
    # CIS 4.2.6: Ensure that the --protect-kernel-defaults argument is set to true
    protectKernelDefaults: true
    # CIS 4.2.7: Ensure that the --make-iptables-util-chains argument is set to true
    makeIPTablesUtilChains: true
    # CIS 4.2.8: Ensure that the --hostname-override argument is not set
    # (Do not set hostnameOverride)
    # CIS 4.2.9: Ensure that the --event-qps argument is set to 0 or a level which ensures appropriate event capture
    eventRecordQPS: 5
    # CIS 4.2.10: Ensure that the --tls-cert-file and --tls-private-key-file arguments are set as appropriate
    tlsCertFile: /var/lib/kubelet/pki/kubelet.crt
    tlsPrivateKeyFile: /var/lib/kubelet/pki/kubelet.key
    # CIS 4.2.11: Ensure that the --rotate-certificates argument is not set to false
    rotateCertificates: true
    # CIS 4.2.12: Ensure that the RotateKubeletServerCertificate argument is set to true
    serverTLSBootstrap: true
    # CIS 4.2.13: Ensure that the Kubelet only makes use of Strong Cryptographic Ciphers
    tlsCipherSuites:
      - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
