# CIS 1.2.x - API Server Configuration
# These settings should be applied to EKS cluster configuration

# CIS 1.2.1: Ensure that the --anonymous-auth argument is set to false
# CIS 1.2.2: Ensure that the --token-auth-file parameter is not set
# CIS 1.2.3: Ensure that the --DenyServiceExternalIPs is not set
# CIS 1.2.4: Ensure that the --kubelet-https argument is set to true
# CIS 1.2.5: Ensure that the --kubelet-client-certificate and --kubelet-client-key arguments are set
# CIS 1.2.6: Ensure that the --kubelet-certificate-authority argument is set
# CIS 1.2.7: Ensure that the --authorization-mode argument is not set to AlwaysAllow
# CIS 1.2.8: Ensure that the --authorization-mode argument includes Node
# CIS 1.2.9: Ensure that the --authorization-mode argument includes RBAC
# CIS 1.2.10: Ensure that the admission control plugin EventRateLimit is set
# CIS 1.2.11: Ensure that the admission control plugin AlwaysAdmit is not set
# CIS 1.2.12: Ensure that the admission control plugin AlwaysPullImages is set
# CIS 1.2.13: Ensure that the admission control plugin SecurityContextDeny is set if PodSecurityPolicy is not used
# CIS 1.2.14: Ensure that the admission control plugin ServiceAccount is set
# CIS 1.2.15: Ensure that the admission control plugin NamespaceLifecycle is set
# CIS 1.2.16: Ensure that the admission control plugin NodeRestriction is set
# CIS 1.2.17: Ensure that the --profiling argument is set to false
# CIS 1.2.18: Ensure that the --audit-log-path argument is set
# CIS 1.2.19: Ensure that the --audit-log-maxage argument is set to 30 or as appropriate
# CIS 1.2.20: Ensure that the --audit-log-maxbackup argument is set to 10 or as appropriate
# CIS 1.2.21: Ensure that the --audit-log-maxsize argument is set to 100 or as appropriate
# CIS 1.2.22: Ensure that the --request-timeout argument is set as appropriate
# CIS 1.2.23: Ensure that the --service-account-lookup argument is set to true
# CIS 1.2.24: Ensure that the --service-account-key-file argument is set as appropriate
# CIS 1.2.25: Ensure that the --etcd-certfile and --etcd-keyfile arguments are set as appropriate
# CIS 1.2.26: Ensure that the --tls-cert-file and --tls-private-key-file arguments are set as appropriate
# CIS 1.2.27: Ensure that the --client-ca-file argument is set as appropriate
# CIS 1.2.28: Ensure that the --etcd-cafile argument is set as appropriate
# CIS 1.2.29: Ensure that the --encryption-provider-config argument is set as appropriate
# CIS 1.2.30: Ensure that encryption providers are appropriately configured
# CIS 1.2.31: Ensure that the API Server only makes use of Strong Cryptographic Ciphers
# CIS 1.2.32: Ensure that the --tls-cipher-suites argument is set as appropriate

apiVersion: v1
kind: ConfigMap
metadata:
  name: api-server-hardening-config
  namespace: kube-system
data:
  recommended-flags: |
    --anonymous-auth=false
    --authorization-mode=Node,RBAC
    --enable-admission-plugins=NodeRestriction,PodSecurityPolicy,ServiceAccount,NamespaceLifecycle,AlwaysPullImages
    --profiling=false
    --audit-log-path=/var/log/kubernetes/audit.log
    --audit-log-maxage=30
    --audit-log-maxbackup=10
    --audit-log-maxsize=100
    --service-account-lookup=true
    --tls-cipher-suites=TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
