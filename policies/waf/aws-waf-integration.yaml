# AWS WAF Integration for Ingress Protection
apiVersion: v1
kind: ConfigMap
metadata:
  name: waf-config
  namespace: istio-ingress
data:
  waf-rules: |
    # AWS WAF WebACL configuration
    # Deploy this via Terraform or AWS Console
    
    Rules:
      # OWASP Top 10 Protection
      - Name: AWSManagedRulesCommonRuleSet
        Priority: 1
        Statement:
          ManagedRuleGroupStatement:
            VendorName: AWS
            Name: AWSManagedRulesCommonRuleSet
        
      # SQL Injection Protection
      - Name: AWSManagedRulesSQLiRuleSet
        Priority: 2
        Statement:
          ManagedRuleGroupStatement:
            VendorName: AWS
            Name: AWSManagedRulesSQLiRuleSet
      
      # Known Bad Inputs
      - Name: AWSManagedRulesKnownBadInputsRuleSet
        Priority: 3
        Statement:
          ManagedRuleGroupStatement:
            VendorName: AWS
            Name: AWSManagedRulesKnownBadInputsRuleSet
      
      # Rate Limiting
      - Name: RateLimitRule
        Priority: 4
        Statement:
          RateBasedStatement:
            Limit: 2000
            AggregateKeyType: IP
      
      # Geo Blocking (optional)
      - Name: GeoBlockRule
        Priority: 5
        Statement:
          GeoMatchStatement:
            CountryCodes:
              - CN  # Block China
              - RU  # Block Russia
              - KP  # Block North Korea
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: protected-ingress
  namespace: default
  annotations:
    # AWS ALB Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # WAF Integration
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:region:account:regional/webacl/name/id"
    # SSL/TLS
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:region:account:certificate/id"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
  - host: app.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app-service
            port:
              number: 80
