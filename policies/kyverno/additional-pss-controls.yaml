apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-capabilities
  annotations:
    policies.kyverno.io/title: Restrict Capabilities
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      CIS 5.2.8: Minimize the admission of containers with capabilities assigned.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: drop-all-capabilities
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "All capabilities must be dropped. Only NET_BIND_SERVICE is allowed."
        pattern:
          spec:
            containers:
            - securityContext:
                capabilities:
                  drop:
                  - ALL
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-hostpath
  annotations:
    policies.kyverno.io/title: Restrict HostPath Volumes
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      CIS 5.2.4: Minimize the admission of containers with hostPath volumes.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: hostpath-volumes
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "HostPath volumes are not allowed."
        pattern:
          spec:
            =(volumes):
            - X(hostPath): "null"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-host-namespaces
  annotations:
    policies.kyverno.io/title: Restrict Host Namespaces
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      CIS 5.2.2, 5.2.3, 5.2.5: Minimize admission of containers with host namespaces.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: host-namespaces
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Sharing host namespaces is not allowed."
        pattern:
          spec:
            =(hostPID): false
            =(hostIPC): false
            =(hostNetwork): false
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-privilege-escalation
  annotations:
    policies.kyverno.io/title: Restrict Privilege Escalation
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      CIS 5.2.7: Minimize the admission of containers with allowPrivilegeEscalation.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: privilege-escalation
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Privilege escalation is not allowed."
        pattern:
          spec:
            containers:
            - securityContext:
                allowPrivilegeEscalation: false
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      CIS 5.2.6: Ensure containers use a read-only root filesystem.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: readonly-rootfs
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Root filesystem must be read-only."
        pattern:
          spec:
            containers:
            - securityContext:
                readOnlyRootFilesystem: true
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-seccomp
  annotations:
    policies.kyverno.io/title: Restrict Seccomp Profile
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      CIS 5.7.2: Ensure that the seccomp profile is set to docker/default or runtime/default.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: seccomp-profile
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Seccomp profile must be set to RuntimeDefault or Localhost."
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: "RuntimeDefault | Localhost"
